idth": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nwake up in the temple (area A5 in Dragon\u0027s Rest) after being rescued", "to": "temple_of_bahamut", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nMyla sells equipment from the Basic Rules to the characters during their stay at Dragon\u0027s Rest", "to": "players", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nCharacters can sleep in the monastic cells (area A1) during their stay at Dragon\u0027s Rest", "to": "cloister_cells", "width": 1}, {"color": null, "from": "kobold_tinkerer", "label": "", "title": "\n\nNine kobolds are utterly devoted to Runara and live at Dragon\u0027s Rest", "to": "runara", "width": 1}, {"color": null, "from": "kobold_tinkerer", "label": "", "title": "\n\nNine kobolds live at Dragon\u0027s Rest and work there at night", "to": "dragons_rest", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nMyla is a kobold tinkerer who lives at Dragon\u0027s Rest with the other kobolds", "to": "kobold_tinkerer", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nRunara helped Myla recover from wing injuries and Myla now lives at Dragon\u0027s Rest", "to": "runara", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nMyla\u0027s wings were badly injured in an attack by Stirge, which she describes negatively", "to": "stirge", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nMyla\u0027s brothers Mek and Minn now follow Sparkrender, the Blue Dragon Wyrmling", "to": "blue_dragon_wyrmling", "width": 1}, {"color": null, "from": "kobold_tinkerer", "label": "", "title": "\n\nKobolds are initially friendly toward adventurers unless otherwise noted", "to": "players", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak tends the cloister\u0027s garden plots, growing flowers, herbs, and vegetables as an avid botanist", "to": "garden_plots", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak frequently visits the sea caves on the south side of the island to acquire heart cap mushrooms from the myconids", "to": "sea_caves", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak visits the myconid caves to acquire heart cap mushrooms from the myconids that live there", "to": "myconid_caves", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak uses heart cap mushrooms acquired from myconids to make Potions of Healing", "to": "potion_of_healing", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak is worried about being turned away from the sea caves by a fungus-covered octopus monster and may give quests to players (see \u0027Cloister Quests\u0027)", "to": "players", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\nspends her twilight years in reflective contemplation at Dragon\u0027s Rest", "to": "dragons_rest", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\nuses mason\u0027s tools to maintain the temple and other areas of the cloister", "to": "temple_of_bahamut", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\ncan shift her attitude to friendly by engaging in conversation on history, ethics, and the impact of individual actions", "to": "players", "width": 1}, {"color": null, "from": "garden_plots", "label": "", "title": "\n\nwell-tended garden plots are located along the lower part of the cliffside path", "to": "cliffside_path", "width": 1}, {"color": null, "from": "cliffside_plaza", "label": "", "title": "\n\nthe path widens into a long plaza about thirty feet above the bay", "to": "cliffside_path", "width": 1}, {"color": null, "from": "astalagans_statue", "label": "", "title": "\n\na stone statue of a dragon is located halfway along the plaza", "to": "cliffside_plaza", "width": 1}, {"color": null, "from": "cliffside_doorways", "label": "", "title": "\n\nsix open doorways are cut into the cliff side along the plaza", "to": "cliffside_plaza", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\ntells characters the statue depicts Astalagan, who died on these cliffs centuries ago", "to": "astalagans_statue", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\noccupies the second cell from the west", "to": "taraks_cell", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\noccupies the third cell from the west", "to": "varnoths_cell", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\noccupies the fourth cell, which is cluttered with junk and tools", "to": "mylas_cluttered_cell", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\ncan occupy the vacant westernmost cell if they don\u0027t mind sharing", "to": "westernmost_vacant_cell", "width": 1}, {"color": null, "from": "player", "label": "", "title": "\n\ncharacters can operate the winch inside the building to lower or raise the pallet", "to": "winch_house", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\ncooks meals in the kitchen on certain days", "to": "kitchen", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nshare three daily meals in the kitchen with cloister residents", "to": "kitchen", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nspends nearly half her time in the library studying, copying, and annotating the collection", "to": "cliff_face_library", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\ncomes to the library to read and discuss various works", "to": "cliff_face_library", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\ncomes to the library to read and discuss various works", "to": "cliff_face_library", "width": 1}, {"color": null, "from": "myla", "label": "", "title": "\n\nvisits the library and is described as studious among the kobolds", "to": "cliff_face_library", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nPlayers enter the library through the oak door and explore the space", "to": "cliff_face_library", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nspends about half her time here, tending and maintaining the temple, offering prayers and incense, or in quiet contemplation", "to": "temple_of_bahamut", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\nhelps Runara maintain the temple along with other residents of the cloister", "to": "runara", "width": 1}, {"color": null, "from": "zombie", "label": "", "title": "\n\nzombies have attacked Blepp the kobold, leaving him with only 2 hit points", "to": "kobold", "width": 1}, {"color": null, "from": "zombie", "label": "", "title": "\n\nzombies are overpowering Tarak the human gardener who is unarmed", "to": "tarak", "width": 1}, {"color": null, "from": "coastal_path", "label": "", "title": "\n\nthe lower path connects the coastal area to Dragon\u0027s Rest", "to": "dragons_rest", "width": 1}, {"color": null, "from": "varnoth", "label": "", "title": "\n\nwitnessed a ship crash on the rocks north of Dragon\u0027s Rest", "to": "northern_rocky_coast", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nsuggests the answer to the recent crashes can be found at the older wreck of Compass Rose", "to": "wreck_of_the_compass_rose", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nRunara is present at the cloister where she interacts with the character", "to": "cloister_cells", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nrecommends the paladin speak with Tarak about escaping corruption", "to": "tarak", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak is currently at Dragon\u0027s Rest, having escaped there after his lover was killed", "to": "dragons_rest", "width": 1}, {"color": null, "from": "runara", "label": "", "title": "\n\nfears Aidron went to the observatory and suspects evil has arisen there, but dares not go herself", "to": "observatory_ruins", "width": 1}, {"color": null, "from": "fume_drake", "label": "", "title": "\n\nthree Fume Drakes are the guardians of the spring, initially hidden in the water", "to": "the_tide_pools", "width": 1}, {"color": null, "from": "fume_drake", "label": "", "title": "\n\nbecomes hostile and emerges from the water to attack if players gather mushrooms or enter the water", "to": "players", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nThe players have arrived at and are exploring the luminescent cove with its hot spring and glowing water", "to": "luminescent_cove", "width": 1}, {"color": null, "from": "owlbear", "label": "", "title": "\n\nhostile toward characters, views them as intruders in its territory and tries to drive them away", "to": "players", "width": 1}, {"color": null, "from": "owlbear", "label": "", "title": "\n\nstranded on the island after shipwreck, now considers this area its territory", "to": "island_interior", "width": 1}, {"color": null, "from": "owlbear", "label": "", "title": "\n\nstranded on the island after shipwreck, now considers this area its territory", "to": "island_wilderness", "width": 1}, {"color": null, "from": "kobold", "label": "", "title": "\n\nFour kobolds and one winged kobold participate together in the ambush as a group", "to": "winged_kobold", "width": 1}, {"color": null, "from": "kobold", "label": "", "title": "\n\nThese kobolds reject the peaceful teachings of Runara", "to": "runara", "width": 1}, {"color": null, "from": "kobold", "label": "", "title": "\n\nKobolds are hiding in rocks and light foliage around the island wilderness", "to": "island_wilderness", "width": 1}, {"color": null, "from": "kobold", "label": "", "title": "\n\nKobolds ambush travelers on w by the blight", "to": "sinensas_sanctum_the_fungal_grotto", "width": 1}, {"color": null, "from": "myconid_caves", "label": "", "title": "\n\nstirges nest in the caves and can be deadly in large numbers to visitors", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "rowboat", "label": "", "title": "\n\nThe rowboat is located at Dragon\u0027s Rest and can be used to travel to Seagrow Caves", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak prefers the rowboat method for traveling to Seagrow Caves", "to": "rowboat", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nPlayers are positioned on the cliffside path overlooking the opening below", "to": "cliffside_path", "width": 1}, {"color": null, "from": "myconid_adult", "label": "", "title": "\n\nadult myconids live in the Seagrow Caves and use rapport spores to warn visitors to leave", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nmyconid sprouts live in the Seagrow Caves and flee to warn adults of intruders", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nsprouts flee toward the nearest adults to warn them of intruders", "to": "myconid_adult", "width": 1}, {"color": null, "from": "sinensa", "label": "", "title": "\n\nSinensa is the leader of the myconids in Seagrow Caves", "to": "myconid_adult", "width": 1}, {"color": null, "from": "sinensa", "label": "", "title": "\n\nSinensa is the myconid leader who has fallen ill in the Seagrow Caves", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nmentioning Tarak\u0027s name or presenting his offering grants advantage on Charisma checks with myconids", "to": "myconid_adult", "width": 1}, {"color": null, "from": "myconid_adult", "label": "", "title": "\n\nmyconids defend themselves if the characters attack them first", "to": "players", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\ncharacters are present in the myconid caves where Rapport Spores are active", "to": "myconid_caves", "width": 1}, {"color": null, "from": "spore_servant_octopus", "label": "", "title": "\n\nlurks in the water of the entrance tunnel, attacking non-myconid creatures", "to": "entrance_tunnel", "width": 1}, {"color": null, "from": "spore_servant_octopus", "label": "", "title": "\n\nattacks any creatures (other than myconids) who enter the tunnel, regardless of tide state", "to": "players", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nThe players are present in the entrance tunnel, observing the bioluminescent fungus and swirling spores in the water", "to": "entrance_tunnel", "width": 1}, {"color": null, "from": "stirge", "label": "", "title": "\n\ntwo Stirge clinging to the tunnel ceiling in the entrance tunnel", "to": "entrance_tunnel", "width": 1}, {"color": null, "from": "stirge", "label": "", "title": "\n\nif fighting breaks out in the area, the disturbed stirges join the battle against the players", "to": "players", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nMolen and Kraz are spreading fertilizer from area B3 in the fungal cavern", "to": "the_fungal_cavern_fungus_farm", "width": 1}, {"color": null, "from": "myconid_adult", "label": "", "title": "\n\nHipsiz and Rugoso tend mushrooms near the upper pool in the fungal cavern", "to": "the_fungal_cavern_fungus_farm", "width": 1}, {"color": null, "from": "violet_fungus", "label": "", "title": "\n\nThree violet fungus grow among the harmless mushrooms in the fungal cavern", "to": "the_fungal_cavern_fungus_farm", "width": 1}, {"color": null, "from": "violet_fungus", "label": "", "title": "\n\nIf characters move into the cave toward the myconids, one violet fungus attacks them with rot-causing tendrils", "to": "players", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nThe players advance into the fungal cavern fungus farm", "to": "the_fungal_cavern_fungus_farm", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nThe Myconid Sprout avoids the characters and the violet fungi", "to": "players", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nThree named sprouts (Bispo, Valup, Popple) work here gathering fertilizer for area B2", "to": "the_rot_cave_larder", "width": 1}, {"color": null, "from": "stirge", "label": "", "title": "\n\nSix stirges live in a nest in the chamber and will attack intruders", "to": "the_rot_cave_larder", "width": 1}, {"color": null, "from": "myconid_sprout", "label": "", "title": "\n\nSprouts rely on stirges as a distraction to escape from intruders", "to": "stirge", "width": 1}, {"color": null, "from": "myconid_adult", "label": "", "title": "\n\nAgric and Omphalo are tending to and caring for the other four myconids (Craterel, Pleuro, Subrufus, and Virosa) who are in a meld trance", "to": "myconid_adult", "width": 1}, {"color": null, "from": "players", "label": "", "title": "\n\nThe players are present in the fungal grotto cavern", "to": "sinensas_sanctum_the_fungal_grotto", "width": 1}, {"color": null, "from": "myconid_adult", "label": "", "title": "\n\nTwo Myconid Adults named Auranta and Enok are present in the sanctum, tending to their leader", "to": "sinensas_sanctum_the_fungal_grotto", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak is located in the cloister cells where he creates elixirs", "to": "cloister_cells", "width": 1}, {"color": null, "from": "tarak", "label": "", "title": "\n\nTarak creates and possesses the elixir of health in the cloister", "to": "elixir_of_health", "width": 1}, {"color": null, "from": "fume_drake", "label": "", "title": "\n\nTwo Fume Drakes lurk amid the sulfurous fumes in this cave", "to": "the_brimstone_cave", "width": 1}, {"color": null, "from": "the_brimstone_cave", "label": "", "title": "\n\nThis cave is the source of the blight spreading through the myconid colony", "to": "seagrow_caves", "width": 1}, {"color": null, "from": "tomb_of_the_red_dragon_sharruth", "label": "", "title": "\n\nThe heart of the problem is the tomb of the red dragon Sharruth deep beneath the island, which causes volcanic activity producing noxious fumes", "to": "the_brimstone_cave", "width": 1}, {"color": null, "from": "tomb_of_the_red_dragon_sharruth", "label": "", "title": "\n\nThe dragon\u0027s energy tears open rifts to the Elemental Plane of Fire, which is the origin of the Fume Drakes", "to": "fume_drake", "width": 1}, {"color": null, "from": "fire_snake", "label": "", "title": "\n\nreleased from a stony egg when the orange crystal is broken, now present in the cave", "to": "western_fissure_blocked", "width": 1}, {"color": null, "from": "fire_snake", "label": "", "title": "\n\nsees the characters only as fuel and attacks them at once upon being released", "to": "players", "width": 1}, {"color": null, "from": "fire_snake", "label": "", "title": "\n\nhatches from its egg in the cave", "to": "the_brimstone_cave", "width": 1}, {"color": null, "from": "sinensa", "label": "", "title": "\n\nSinensa gives the ruby morel and permission to keep treasure to the players when they awaken", "to": "players", "width": 1}, {"color": null, "from": "harpy", "label": "", "title": "\n\nsettled into the wreck of Compass Rose", "to": "wreck_of_the_compass_rose", "width": 1}, {"color": null, "from": "harpy", "label": "", "title": "\n\nlures ships to crash on the shoal with its magically entrancing voice", "to": "the_northern_shoals", "width": 1}, {"color": null, "from": "harpy", "label": "", "title": "\n\nfeasts on unlucky sailors who crash on the shoal", "to": "players", "width": 1}, {"color": null, "from": "zombie", "label": "", "title": "\n\nshambling zombies from shipwrecks menace the island\u0027s shore", "to": "stormwreck_isle", "width": 1}, {"color": n
