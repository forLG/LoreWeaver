ng stranded here when its performing troupe\u0027s ship crashed", "to": "owlbears_territory", "width": 1}, {"color": null, "from": "creature:owlbear", "label": "", "title": "\n\nThe owlbear is hostile toward the characters, viewing them as intruders in its territory, though its goal is to drive them away rather than kill them", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:kobold", "label": "", "title": "\n\nkobolds are hiding in rocks and light foliage around the island, attempting to ambush travelers", "to": "stormwreck_isle", "width": 1}, {"color": null, "from": "creature:winged_kobold", "label": "", "title": "\n\nwinged kobold participates in the ambush alongside regular kobolds", "to": "stormwreck_isle", "width": 1}, {"color": null, "from": "creature:kobold", "label": "", "title": "\n\nkobolds reject the peaceful teachings of Runara", "to": "creature:runara", "width": 1}, {"color": null, "from": "creature:kobold", "label": "", "title": "\n\nkobolds prey on travelers who stray away from Dragon\u0027s Rest", "to": "dragon_s_rest", "width": 1}, {"color": null, "from": "creature:kobold", "label": "", "title": "\n\ngroup of kobolds attempts to ambush the characters while traveling around the island", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:winged_kobold", "label": "", "title": "\n\nwinged kobold participates in the ambush against the characters", "to": "party:characters", "width": 1}, {"color": null, "from": "stormwreck_isle", "label": "", "title": "\n\nwas formed from magic-fueled volcanic activity in the tomb", "to": "sharruths_tomb", "width": 1}, {"color": null, "from": "seagrow_caves_entrance", "label": "", "title": "\n\nactivity suggests that all is not well beneath the island", "to": "stormwreck_isle", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacters might investigate Sharruth\u0027s tomb in adventures", "to": "sharruths_tomb", "width": 1}, {"color": null, "from": "creature:tarak", "label": "", "title": "\n\nTarak used to visit the myconid caves regularly to trade with them", "to": "myconid_caves", "width": 1}, {"color": null, "from": "creature:sinensa", "label": "", "title": "\n\nSinensa is the leader of the myconids who live in the caves", "to": "myconid_caves", "width": 1}, {"color": null, "from": "creature:tarak", "label": "", "title": "\n\nTarak\u0027s visits have been rejected by the myconids under Sinensa\u0027s leadership", "to": "creature:sinensa", "width": 1}, {"color": null, "from": "sharruths_tomb", "label": "", "title": "\n\nNoxious fumes from Sharruth\u0027s tomb are poisoning the myconids and twisting their gardens", "to": "myconid_caves", "width": 1}, {"color": null, "from": "seagrow_caves_entrance", "label": "", "title": "\n\nThe myconids have placed a monstrous guardian at the entrance to keep all visitors away", "to": "myconid_caves", "width": 1}, {"color": null, "from": "spell:lesser_restoration", "label": "", "title": "\n\nThe lesser restoration spell can end the poisoned condition caused by toxic fumes if characters fail their Constitution saving throw", "to": "party:characters", "width": 1}, {"color": null, "from": "item:rowboat", "label": "", "title": "\n\nThe rowboat from Dragon\u0027s Rest can be used to travel to Seagrow Caves by boat", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "creature:tarak", "label": "", "title": "\n\nTarak prefers the boat method for reaching Seagrow Caves", "to": "item:rowboat", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party observes an opening in the cliff face two hundred feet below them", "to": "sea_worn_cliffs", "width": 1}, {"color": null, "from": "columnar_stairways", "label": "", "title": "\n\nTwo natural stairways formed of stone columns offer ways down the cliffs", "to": "sea_worn_cliffs", "width": 1}, {"color": null, "from": "creature:myconid_adult", "label": "", "title": "\n\nMyconid adults live in the caves and use Rapport Spores to warn visitors to leave", "to": "myconid_caves", "width": 1}, {"color": null, "from": "creature:myconid_sprout", "label": "", "title": "\n\nMyconid sprouts live in the caves and flee to warn adults of intruders", "to": "myconid_caves", "width": 1}, {"color": null, "from": "creature:myconid_sprout", "label": "", "title": "\n\nSprouts flee toward the nearest adults to warn them of intruders", "to": "creature:myconid_adult", "width": 1}, {"color": null, "from": "creature:sinensa", "label": "", "title": "\n\nSinensa is the leader of the myconids, and the sprouts know she has fallen ill", "to": "creature:myconid_sprout", "width": 1}, {"color": null, "from": "creature:sinensa", "label": "", "title": "\n\nSinensa is the leader of the myconids, and the adults know she fell ill after investigating the crystal cave", "to": "creature:myconid_adult", "width": 1}, {"color": null, "from": "creature:tarak", "label": "", "title": "\n\nMentioning Tarak\u0027s name or presenting his offering grants advantage on Charisma checks with myconids", "to": "creature:myconid_adult", "width": 1}, {"color": null, "from": "creature:myconid_adult", "label": "", "title": "\n\nIf the characters attack, the myconids defend themselves", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:myconid_adult", "label": "", "title": "\n\nMyconids warn visitors to leave the caves and defend their territory", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party is exploring the myconid caves", "to": "myconid_caves", "width": 1}, {"color": null, "from": "creature:spore_servant_octopus", "label": "", "title": "\n\nattacks any creatures (other than myconids) who enter the tunnel, regardless of the state of the tides", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:spore_servant_octopus", "label": "", "title": "\n\nlurks in the water of the tunnel entrance", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "creature:stirge", "label": "", "title": "\n\nTwo stirges clinging to the tunnel ceiling are disturbed if fighting breaks out and join the battle against the characters", "to": "party:characters", "width": 1}, {"color": "rgba(50, 50, 50, 0.1)", "from": "creature:myconid_sprout", "label": "", "title": "\n\nMolen and Kraz are spreading fertilizer from area B3 in the fungal cavern", "to": "location:the_fungal_cavern", "width": 1}, {"color": "rgba(50, 50, 50, 0.1)", "from": "creature:myconid_adult", "label": "", "title": "\n\nHipsiz and Rugoso tend mushrooms near the upper pool in the fungal cavern", "to": "location:the_fungal_cavern", "width": 1}, {"color": "rgba(50, 50, 50, 0.1)", "from": "creature:violet_fungus", "label": "", "title": "\n\nthree violet fungus grow among the harmless mushrooms in the fungal cavern", "to": "location:the_fungal_cavern", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nviolet fungus are a hidden threat to the myconids who are oblivious to their presence", "to": "creature:myconid_sprout", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nviolet fungus are a hidden threat to the myconids who are oblivious to their presence", "to": "creature:myconid_adult", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nif characters move into the cave toward the myconids, one violet fungus attacks with rot-causing tendrils", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nmultiple violet fungi are present in the fungal cavern, some motionless until approached", "to": "the_fungal_cavern", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nviolet fungi inhabit the fungal grotto as part of the larger fungal farm area", "to": "the_fungal_grotto", "width": 1}, {"color": null, "from": "creature:violet_fungus", "label": "", "title": "\n\nviolet fungi are found in the fungal ring cavern within the fungal farm", "to": "the_fungal_ring_cavern", "width": 1}, {"color": null, "from": "creature:myconid_sprout", "label": "", "title": "\n\nThe Myconid Sprout avoid the characters and the violet fungi", "to": "party:characters", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacter examines fungi in the fungal cavern and notices sickly, shriveled mushrooms with black decay patches", "to": "the_fungal_cavern", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacter examines fungi in the fungal grotto and notices sickly, shriveled mushrooms with black decay patches", "to": "the_fungal_grotto", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacter examines fungi in the fungal ring cavern and notices sickly, shriveled mushrooms with black decay patches", "to": "the_fungal_ring_cavern", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacter examines fungi in the rot filled cave and notices sickly, shriveled mushrooms with black decay patches", "to": "the_rot_filled_cave", "width": 1}, {"color": null, "from": "creature:myconid_sprout", "label": "", "title": "\n\nThree named Myconid Sprouts (Bispo, Valup, Popple) work here gathering fertilizer for use in area B2", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "creature:stirge", "label": "", "title": "\n\nSix Stirges inhabit a nest in the chamber and will emerge to attack if characters move more than 5 feet into the chamber", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "creature:stirge", "label": "", "title": "\n\nThe Stirges provide a distraction that allows the Myconid Sprouts to flee toward area B4 at the first sign of intruders", "to": "creature:myconid_sprout", "width": 1}, {"color": null, "from": "creature:myconid_adult", "label": "", "title": "\n\nAgric and Omphalo are tending to Craterel, Pleuro, Subrufus, and Virosa who are in a dream-like trance called a meld", "to": "creature:myconid_adult", "width": 1}, {"color": null, "from": "creature:tarak", "label": "", "title": "\n\nTarak will make an elixir of health for the characters if they bring him a ruby morel fungus", "to": "item:elixir_of_health", "width": 1}, {"color": null, "from": "creature:fume_drake", "label": "", "title": "\n\nTwo Fume Drakes lurk amid the sulfurous fumes in the cave and don\u0027t leave this cave", "to": "crystal_vent", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party is currently exploring the brimstone cavern, observing its features", "to": "the_brimstone_cavern", "width": 1}, {"color": null, "from": "creature:fire_snake", "label": "", "title": "\n\nreleased from a stony egg when the orange crystal is broken, now present in the cave", "to": "crystal_vent", "width": 1}, {"color": null, "from": "creature:fire_snake", "label": "", "title": "\n\nsees the characters only as fuel and attacks them at once upon release", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:sinensa", "label": "", "title": "\n\nSinensa is the myconid leader who regains consciousness in the caves", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "creature:sinensa", "label": "", "title": "\n\nSinensa gives the characters the ruby morel and permission to keep treasure if they destroy the orange crystal", "to": "party:characters", "width": 1}, {"color": null, "from": "creature:harpy", "label": "", "title": "\n\nsettled into the wreck of Compass Rose and uses it as its lair", "to": "the_wreck_of_the_compass_rose", "width": 1}, {"color": null, "from": "creature:harpy", "label": "", "title": "\n\nlures ships to crash on the shoal with its magically entrancing voice", "to": "the_northern_shoals", "width": 1}, {"color": null, "from": "creature:zombie", "label": "", "title": "\n\nthe cursed talisman in the ship\u0027s hold animates drowned sailors as zombies", "to": "ships_hold", "width": 1}, {"color": null, "from": "creature:spore_servant_octopus", "label": "", "title": "\n\ncan be found in other sunken wrecks as a potential danger", "to": "sunken_wrecks_general_area", "width": 1}, {"color": null, "from": "creature:ghoul", "label": "", "title": "\n\ncan be found in other sunken wrecks as a potential danger", "to": "sunken_wrecks_general_area", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nassumed to be exploring the wreck of Compass Rose for clues", "to": "the_wreck_of_the_compass_rose", "width": 1}, {"color": null, "from": "the_wreck_of_the_compass_rose", "label": "", "title": "\n\nThe wreck is located at the northern end of the spur of sharp rocks and dragon bones", "to": "spur_of_rocks_and_dragon_bones", "width": 1}, {"color": null, "from": "item:rowboat", "label": "", "title": "\n\nThe rowboat is located at Dragon\u0027s Rest and can be taken by the characters", "to": "dragon_s_rest", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe characters can take the rowboat to travel to the wreck of Compass Rose", "to": "item:rowboat", "width": 1}, {"color": null, "from": "item:rowboat", "label": "", "title": "\n\nThe characters can tie up the rowboat to the south (starboard) side of the wreck", "to": "the_wreck_of_the_compass_rose", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe characters can climb onto the main deck (area C1) from the rowboat tied to the wreck", "to": "main_deck", "width": 1}, {"color": null, "from": "spur_of_rocks_and_dragon_bones", "label": "", "title": "\n\nThe derelict ship is lodged against the spur of rocks and dragon bones", "to": "main_deck", "width": 1}, {"color": null, "from": "tattered_rigging", "label": "", "title": "\n\nTattered sails and rigging hang off the starboard side of the main deck", "to": "main_deck", "width": 1}, {"color": null, "from": "gaping_hull_breach", "label": "", "title": "\n\nA gaping hole in the hull is located at the stern of the ship", "to": "main_deck", "width": 1}, {"color": null, "from": "creature:harpy", "label": "", "title": "\n\nreturns to the shipwreck after looking for other ships to lure onto rocks", "to": "main_deck", "width": 1}, {"color": null, "from": "item:tiger_eye", "label": "", "title": "\n\ntwo small tiger eye gems found in the crow\u0027s nest on the main deck", "to": "main_deck", "width": 1}, {"color": null, "from": "item:bloodstone", "label": "", "title": "\n\none bloodstone gem found in the crow\u0027s nest on the main deck", "to": "main_deck", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacters search through the crow\u0027s nest and find two tiger eye gems", "to": "item:tiger_eye", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacters search through the crow\u0027s nest and find one bloodstone gem", "to": "item:bloodstone", "width": 1}, {"color": null, "from": "creature:zombie", "label": "", "title": "\n\nis in area C4 on the quarterdeck and responds to loud noises", "to": "quarterdeck", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party is present on the quarterdeck, observing the damaged state of the ship", "to": "quarterdeck", "width": 1}, {"color": null, "from": "creature:zombie", "label": "", "title": "\n\ntwo zombies are inside the captain\u0027s quarters, either beside the door or aimlessly shuffling around the cabin", "to": "captains_quarters", "width": 1}, {"color": null, "from": "item:pouch", "label": "", "title": "\n\nfound in one of the small drawers in the desk", "to": "captains_quarters", "width": 1}, {"color": null, "from": "item:cartographer\u0027s_tools", "label": "", "title": "\n\nfound in one of the small drawers in the desk", "to": "captains_quarters", "width": 1}, {"color": null, "from": "item:dagger", "label": "", "title": "\n\nfound in one of the small drawers in the desk", "to": "captains_quarters", "width": 1}, {"color": null, "from": "item:fine_clothes", "label": "", "title": "\n\nworn by the blond-haired man in the portrait found in the crew quarters", "to": "crew_quarters", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party is searching the cabin in the crew quarters", "to": "crew_quarters", "width": 1}, {"color": null, "from": "item:sack", "label": "", "title": "\n\nA sack full of 200 gp rests in a small compartment beneath the raised floorboard in the crew quarters", "to": "crew_quarters", "width": 1}, {"color": null, "from": "creature:zombie", "label": "", "title": "\n\nis an obvious threat in the lower deck", "to": "lower_deck", "width": 1}, {"color": null, "from": "creature:ghoul", "label": "", "title": "\n\nlurks in the aft part of the hold, waiting to attack", "to": "lower_deck", "width": 1}, {"color": null, "from": "creature:ghoul", "label": "", "title": "\n\nis more cunning than the zombies and uses them as distraction", "to": "creature:zombie", "width": 1}, {"color": null, "from": "creature:ghoul", "label": "", "title": "\n\nwaits to attack until characters are busy with the zombie, hoping to paralyze and drag one away", "to": "party:characters", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe party descends to the lower deck, which is chilly, wet, and unsettling with seawater obscuring the floor", "to": "lower_deck", "width": 1}, {"color": null, "from": "item:crowbar", "label": "", "title": "\n\ncharacters can use a crowbar to pry open crates more quickly", "to": "party:characters", "width": 1}, {"color": null, "from": "item:sack", "label": "", "title": "\n\na 20-pound sack of whole cloves can be found in crates on the lower deck", "to": "lower_deck", "width": 1}, {"color": null, "from": "item:lute", "label": "", "title": "\n\na fine lute with mother-of-pearl inlay can be found in crates on the lower deck", "to": "lower_deck", "width": 1}, {"color": null, "from": "item:spell_scroll", "label": "", "title": "\n\na spell scroll sealed in a leather case can be found in crates on the lower deck", "to": "lower_deck", "width": 1}, {"color": null, "from": "spell:command", "label": "", "title": "\n\nthe spell scroll contains the command spell", "to": "item:spell_scroll", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nventuring into the submerged hold, swimming around and able to surface to breathe as needed", "to": "ships_hold", "width": 1}, {"color": null, "from": "item:pouch", "label": "", "title": "\n\nThe pouch contains three turquoise gems along with gold coins", "to": "item:turquoise", "width": 1}, {"color": null, "from": "item:boots_of_elvenkind", "label": "", "title": "\n\nThe boots of elvenkind are contained within the same pouch as the turquoise and gold", "to": "item:pouch", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nA character can cast detect magic to reveal the necromantic magic on the talisman", "to": "spell:detect_magic", "width": 1}, {"color": null, "from": "creature:ghoul", "label": "", "title": "\n\nMany Undead creatures like Ghoul worship Orcus, the Demon Prince of Undeath", "to": "creature:ghoul", "width": 1}, {"color": null, "from": "creature:harpy", "label": "", "title": "\n\nuses its Luring Song on its first turn to charm the characters and draw them up to the crow\u0027s nest", "to": "party:characters", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacters explore the caves as part of their adventure", "to": "seagrow_caves_entrance", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\ncharacters are ready to visit Clifftop Observatory in chapter 4 after reaching 3rd level", "to": "clifftop_observatory_tower", "width": 1}, {"color": null, "from": "creature:runara", "label": "", "title": "\n\nbattled centuries ago, with the blue dragon being Runara\u0027s ancient rival", "to": "creature:blue_dragon_wyrmling", "width": 1}, {"color": null, "from": "creature:blue_dragon_wyrmling", "label": "", "title": "\n\nhas made the observatory ruins his home in recent months", "to": "clifftop_observatory_tower", "width": 1}, {"color": null, "from": "creature:blue_dragon_wyrmling", "label": "", "title": "\n\noverpowered and imprisoned Aidron (the bronze wyrmling) in the observatory ruins", "to": "creature:bronze_dragon_wyrmling", "width": 1}, {"color": null, "from": "creature:bronze_dragon_wyrmling", "label": "", "title": "\n\ncame to the ancient observatory about five days before the characters arrived", "to": "clifftop_observatory_tower", "width": 1}, {"color": null, "from": "creature:bronze_dragon_wyrmling", "label": "", "title": "\n\nwas under Runara\u0027s tutelage at Dragon\u0027s Rest before leaving", "to": "creature:runara", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nThe characters see Sparkrender come to rest on the rocky spire off the coast", "to": "sparkrenders_spire", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nsees crumbling ruins atop basalt columns from their boat", "to": "the_basalt_columns_ruins", "width": 1}, {"color": null, "from": "party:characters", "label": "", "title": "\n\nnotices a winged, glittering blue shape come to rest atop the farthest column and vanish", "to": "the_farthest_column", "width": 1}, {"color": null, "from": "creature:winged_kobold", "label": "", "title": "\n\nlocked in battle with eight stirges at the clifftop observatory tower", "to": "creature:stirge", "width": 1}, {"color": null, "from": "creature:winged_kobold", "label": "", "title": "\n\nMek and Minn are brothers of Myla, the kobold tinkerer at Dragon\u0027s Re
